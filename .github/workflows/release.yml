name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag à releaser (ex. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Compile (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-linux-x64, runner: ubuntu-latest, ext: "" }
          - { target: bun-linux-arm64, runner: ubuntu-latest, ext: "" }
          - { target: bun-darwin-x64, runner: macos-latest, ext: "" }
          - { target: bun-darwin-arm64, runner: macos-latest, ext: "" }
          - { target: bun-windows-x64, runner: ubuntu-latest, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run gen:entries

      - name: Compile
        run: |
          bun build src/index.ts \
            --compile \
            --minify \
            --sourcemap \
            --target=${{ matrix.target }} \
            --outfile=dist/shenron-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: shenron-${{ matrix.target }}
          path: dist/shenron-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 sums
        run: |
          cd artifacts
          sha256sum shenron-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          {
            echo "changelog<<__EOF__"
            echo "## Commits depuis la release précédente"
            PREV=$(git tag --sort=-creatordate | grep -v "^$TAG$" | head -1 || echo "")
            if [ -n "$PREV" ]; then
              git log --pretty=format:"- %s (%h)" "$PREV..$TAG"
            else
              git log --pretty=format:"- %s (%h)" "$TAG"
            fi
            echo ""
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: Shenron ${{ steps.changelog.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Binaires standalone

            Télécharge le binaire pour ta plateforme, rends-le exécutable, lance-le avec un `.env` rempli à côté.

            | Plateforme | Fichier |
            |---|---|
            | Linux x64 | `shenron-bun-linux-x64` |
            | Linux ARM64 | `shenron-bun-linux-arm64` |
            | macOS Intel | `shenron-bun-darwin-x64` |
            | macOS Apple Silicon | `shenron-bun-darwin-arm64` |
            | Windows x64 | `shenron-bun-windows-x64.exe` |

            Vérifie l'intégrité via `SHA256SUMS.txt`.

            ## Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/aphrody-code/shenron/main/scripts/install.sh | bash
            ```
          files: |
            artifacts/shenron-*
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.tag, '-') }}
