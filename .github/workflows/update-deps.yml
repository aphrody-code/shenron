name: Update deps (weekly)

on:
  schedule:
    # Tous les lundis 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bun-update:
    name: bun update + PR
    runs-on: ubuntu-latest
    env:
      DISCORD_TOKEN: test-token
      GUILD_ID: "1497167233280118896"
      OWNER_ID: "11111111111111111"
      DATABASE_PATH: "./data/test-ci.db"
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Capture état avant
        id: before
        run: |
          cp bun.lock /tmp/bun.lock.before
          bun outdated --json > /tmp/outdated.json 2>/dev/null || echo "[]" > /tmp/outdated.json

      - name: Update deps (semver-respecting)
        run: bun update

      - name: Régénère entries + verify
        run: |
          bun run gen:entries
          bun run type-check
          bun run lint
          bun run test

      - name: Diff
        id: diff
        run: |
          if cmp -s /tmp/bun.lock.before bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "summary<<__EOF__"
              echo "## Mises à jour appliquées"
              echo ""
              diff -u /tmp/bun.lock.before bun.lock | grep -E '^\+.*"version"' | head -30 || true
              echo ""
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/weekly-deps-update
          delete-branch: true
          title: "chore(deps): bun update hebdomadaire"
          commit-message: "chore(deps): bun update"
          body: |
            Mise à jour automatique des dépendances via `bun update` (respect semver).

            ${{ steps.diff.outputs.summary }}

            ✅ Type-check, lint et tests passent localement dans le job CI.

            _Si un merge-conflit apparaît plus tard, ferme cette PR — elle sera recréée lundi prochain._
          labels: dependencies,automated
