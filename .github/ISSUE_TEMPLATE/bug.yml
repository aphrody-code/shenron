name: Bug report
description: Signaler un bug reproductible
labels: [bug, triage]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que devrait faire le bot ? Que fait-il à la place ?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Étapes précises pour reproduire (commande, contexte guilde, état DB si pertinent).
      placeholder: |
        1. Lancer `/top`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs pertinents
      description: Extrait de `bun run dev` ou des logs systemd. Masque les tokens.
      render: text
  - type: input
    id: bun-version
    attributes:
      label: Version Bun
      placeholder: "bun --version → 1.3.x"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Plateforme
      placeholder: "Linux x64 / macOS arm64 / Windows x64"
